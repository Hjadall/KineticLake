name: CD - Deploy to Databricks

# 1. THE TRIGGER: Wait for the CI pipeline to finish
on:
  workflow_run:
    workflows: ["CI - Test and Lint"] # Must match the 'name:' of your ci.yml exactly
    types:
      - completed
    branches:
      - main
  workflow_dispatch: # Still allows you to click a manual deploy button if needed

jobs:
  deploy:
    name: Validate and Deploy
    runs-on: ubuntu-latest
    
    # 2. THE SAFEGUARD: Only run if the CI pipeline actually PASSED
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks Bundle
        run: databricks bundle validate -t dev

      - name: Deploy Databricks Bundle
        run: databricks bundle deploy -t dev